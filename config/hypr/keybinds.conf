## Keybinds ##
source = ./programs.conf

$mainMod = SUPER
$left = h
$down = j
$up = k
$right = l

# Close
bind = $mainMod, Q, killactive,

# Fullscreen
bind = $mainMod, F, fullscreen

# Launch
bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, D, exec, $menu -show drun -hint-welcome ""
bind = $mainMod, V, exec, cliphist list | $menu -dmenu | cliphist decode | wl-copy
bind = $mainMod CONTROL, Q, exec, $lockscreen
bind = $mainMod, TAB, exec, $menu -modi "window" -show window
bind = $mainMod, F12, exec, rofimoji --clipboarder wl-copy
bind = $mainMod SHIFT, P, exec, $colorpicker
bind = $mainMod SHIFT, S, exec, $screenshot -m region
bind = , Print, exec, $screenshot -m window

# Special Workspaces
# music
bind = $mainMod, B, togglespecialworkspace, background
bind = $mainMod SHIFT, B, movetoworkspace, special:background
# notes
bind = $mainMod, N, togglespecialworkspace, notes
bind = $mainMod SHIFT, N, movetoworkspace, special:notes
# obs
bind = $mainMod, O, togglespecialworkspace, obs
bind = $mainMod SHIFT, O, movetoworkspace, special:obs
# general purpose
bind = $mainMod, MINUS, togglespecialworkspace, scratch -
bind = $mainMod SHIFT, MINUS, movetoworkspace, special:scratch -
bind = $mainMod, PLUS, togglespecialworkspace, scratch +
bind = $mainMod SHIFT, PLUS, movetoworkspace, special:scratch +

# Switch layouts
bind = $mainMod SHIFT, SPACE, togglefloating,
bind = $mainMod, space, exec, $(hyprctl activewindow -j | jq '.floating') && hyprctl dispatch cyclenext tiled || hyprctl dispatch cyclenext floating
bind = $mainMod, W, togglegroup,

# Resize
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Switch to custom resize submap
bind = $mainMod, R, submap, resize 󰩨

submap = resize 󰩨

binde = , $right, resizeactive, 20 0
binde = , $left, resizeactive, -20 0
binde = , $up, resizeactive, 0 -20
binde = , $down, resizeactive, 0 20

bind = $mainMod, R, submap, reset
bind = , escape, submap, reset

# Reset the submap, which will return to the global submap
submap = reset


bind = $mainMod, G, submap, group/ungroup

# Groups
submap = group/ungroup

binde = ,x, moveoutofgroup

binde = ,$left, moveintogroup, l
binde = ,$right, moveintogroup, r
binde = ,$up, moveintogroup, u
binde = ,$down, moveintogroup, d

binde = ,$left, submap, reset
binde = ,$right, submap, reset
binde = ,$up, submap, reset
binde = ,$down, submap, reset
binde = ,x, submap, reset

bind = $mainMod, G, submap, reset
bind = , escape, submap, reset

submap = reset

#Pin window
bind = $mainMod, P, pin

# Move focus
bind = $mainMod, $left, exec, ~/.config/hypr/scripts/group_move.sh switch l
bind = $mainMod, $right, exec, ~/.config/hypr/scripts/group_move.sh switch r
bind = $mainMod, $up, movefocus, u
bind = $mainMod, $down, movefocus, d



# Move windows
bind = $mainMod SHIFT, $left, movewindow, l
bind = $mainMod SHIFT, $right, movewindow, r
bind = $mainMod SHIFT, $up, movewindow, u
bind = $mainMod SHIFT, $down, movewindow, d

bind = $mainMod SHIFT, $left, movegroupwindow, b
bind = $mainMod SHIFT, $right, movegroupwindow, f


# Swap windows
bind = $mainMod CONTROL, $left, swapwindow, l
bind = $mainMod CONTROL, $right, swapwindow, r
bind = $mainMod CONTROL, $up, swapwindow, u
bind = $mainMod CONTROL, $down, swapwindow, d

workspace = 1, monitor:DP-1
workspace = 2, monitor:DP-1
workspace = 3, monitor:DP-1
workspace = 4, monitor:DP-1
workspace = 5, monitor:DP-1
workspace = 6, monitor:DP-1
workspace = 7, monitor:DP-1
workspace = 8, monitor:DP-1
workspace = 9, monitor:DP-1
workspace = 10, monitor:DP-1
workspace = 11, monitor:HDMI-A-1,persistent:true

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10
bind = $mainMod, m, workspace, 11

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10
bind = $mainMod SHIFT, m, movetoworkspace, 11

# Audio/Playback Controls
bindl = , XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
bindl = , XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
bindl = , XF86AudioMute, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle
bindl = , XF86AudioMicMute, exec, pactl set-source-mute @DEFAULT_SOURCE@ toggle
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
