$font = Ioskeley Mono

general {
    hide_cursor = true
}

animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 5, linear
    animation = fadeOut, 1, 5, linear
    animation = inputFieldDots, 1, 2, linear
}

background {
    monitor = DP-1
    # path = ~/Documents/Wallpapers/surreal_girl_existential.png
    path = ~/Documents/Wallpapers/firelink_painting.jpeg
    blur_passes = 0
}

background {
    monitor = HDMI-A-1
    path = ~/Documents/Wallpapers/door.png
    blur_passes = 0
}

input-field {
    monitor = DP-1
    size = 20%, 5%
    outline_thickness = 2
    inner_color = rgba(70, 70, 70, 0.9)
    outer_color = rgba(70, 70, 70, 0.9)

    font_color = rgb(200,200,200)
    fade_on_empty = false
    rounding = 15

    font_family = $font
    placeholder_text = ...
    fail_text = $PAMFAIL

    # uncomment to use a letter instead of a dot to indicate the typed password
    dots_text_format = *
    # dots_size = 0.4
    dots_spacing = 0.3

    # uncomment to use an input indicator that does not show the password length (similar to swaylock's input indicator)
    # hide_input = true

    position = 0, -20
    halign = center
    valign = center
}

# TIME
label {
    monitor =
    text = $TIME # ref. https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock/#variable-substitution
    font_size = 90
    font_family = $font

    position = 30, 0
    halign = left
    valign = top
}

# DATE
label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B %Y" # update every 60 seconds
    font_size = 25
    font_family = $font

    position = 30, -150
    halign = left
    valign = top
}
