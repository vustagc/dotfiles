<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>

<alias>
    <family>serif</family>
    <prefer><family>Ioskeley Mono</family></prefer>
    <prefer><family>Noto Sans Mono</family></prefer>
  </alias>
  <alias>
    <family>sans-serif</family>
    <prefer><family>Ioskeley Mono</family></prefer>
    <prefer><family>Noto Serif Mono</family></prefer>
  </alias>
  <alias>
    <family>monospace</family>
    <prefer><family>Ioskeley Mono</family></prefer>
    <prefer><family>Noto Sans Mono</family></prefer>
  </alias>
</fontconfig>
