;   To learn more about how to configure Polybar
;   go to https://github.com/polybar/polybar

include-file = $HOME/.config/polybar/themes/lofi/include-modules.ini

[module/polybar_windows]
type = custom/script
exec = $HOME/.config/polybar/scripts/windows/module.py
tail = true

[module/tray_open]
type = custom/text
label = "<<"
click-left = polybar-msg action tray module_toggle && polybar-msg action tray_open module_toggle && polybar-msg action tray_close module_toggle
format-padding = 4px

[module/tray_close]
type = custom/text
label = ">>"
hidden = true
click-left = polybar-msg action tray module_toggle && polybar-msg action tray_open module_toggle && polybar-msg action tray_close module_toggle
format-padding = 4px


[bar/main]
width = 100%
height = 30
offset-y = 0
fixed-center = true
monitor = DP-0

override-redirect = false

; scroll-up = next
; scroll-down = prev

enable-ipc = true

background = ${colors.trans}
foreground = ${colors.fg}


include-file = $HOME/.config/polybar/fonts.ini
;
modules-left = workspaces
modules-center = title
modules-right = tray_close tray_open tray wired network pulseaudio popup-calendar

cursor-click = pointer
cursor-scroll = pointer


[settings]
screenchange-reload = true
