# -- Gruvbox
set -g @plugin 'egel/tmux-gruvbox'
set -g @tmux-gruvbox 'dark256'
set -g @tmux-gruvbox-statusbar-alpha 'true'
set -g @tmux-gruvbox-right-status-x '%d.%m.%Y'
set -g @tmux-gruvbox-right-status-z '#{tmux_mode_indicator}'

set -g @mode_indicator_empty_mode_style 'bg=colour248,fg=black'
set -g @mode_indicator_prefix_mode_style 'bg=color248,fg=black'
set -gq allow-passthrough on
set -g visual-activity off
set -g mouse on

set -g status-right-length 100
set -g base-index 1
set -ga terminal-overrides ',xterm-256color:Tc'

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'MunifTanjim/tmux-mode-indicator'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin '27medkamal/tmux-session-wizard'
set -g @plugin 'laktak/extrakto'
# set -g @resurrect-strategy-vim 'session'

# Theme
# set -g @plugin 'niksingh710/minimal-tmux-status'
# set -g @minimal-tmux-fg "#FFFFFF"
# set -g @minimal-tmux-bg "#665c54"
# set -g @minimal-tmux-justify "centre"
# set -g window-status-format "#I #W"
# set -g window-status-current-format "#I #W"

# If getting strings cut in left status or right
# Here 20 is the length of the characters in the string
# set -g status-right-length 20
# set -g status-left-length 20


# Keybinds
set -g @session-wizard 'o'
set -g @extrakto_key 'y'

bind -n C-, select-window -t -1
bind -n C-. select-window -t +1

unbind C-b
set -g prefix C-space
bind C-space send-prefix

bind-key n new-window -c "#{pane_current_path}"
bind-key  %  split-window -h -c "#{pane_current_path}"
bind-key - split-window -v -c "#{pane_current_path}"

bind-key q kill-window

# is_vim='ps -o state= -o comm= -t "#{pane_tty}" | grep -iqE "^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$" && [ "$DISPLAY" = "" ]'
#
# bind -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
# bind -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
# bind -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
# bind -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"

# Define the command for checking if the current pane is running Vim (not in GUI)
set -g @is_vim 'ps -o state= -o comm= -t "#{pane_tty}" | grep -iqE "^[^TXZ ]+ +(\\S+\/)?g?(view|n?vim?x?)(diff)?$" && [ "$DISPLAY" = "" ]'

# Use the definition directly in the bind commands
bind -n C-h if-shell -F "#{@is_vim}" "send-keys C-h" "select-pane -L"
bind -n C-j if-shell -F "#{@is_vim}" "send-keys C-j" "select-pane -D"
bind -n C-k if-shell -F "#{@is_vim}" "send-keys C-k" "select-pane -U"
bind -n C-l if-shell -F "#{@is_vim}" "send-keys C-l" "select-pane -R"

# tpm
run '~/.tmux/plugins/tpm/tpm'
