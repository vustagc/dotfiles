set-window-option -g mode-keys vi

set -g @resurrect-strategy-nvim 'session'
set -g default-command /usr/bin/zsh

# Keybinds
bind -n C-, select-window -t -1
bind -n C-. select-window -t +1
unbind C-b
set -g prefix C-space
bind C-space send-prefix

bind-key % split-window -h -c "#{pane_current_path}"
bind-key - split-window -v -c "#{pane_current_path}"
bind-key q kill-window

# bind-key h select-pane -L
# bind-key l select-pane -R
# bind-key j select-pane -U
# bind-key k select-pane -D

bind-key y copy-mode
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Theme
set -g @mode_indicator_empty_mode_style 'bg=colour248,fg=black'
set -g @mode_indicator_prefix_mode_style 'bg=color248,fg=black'
set -gq allow-passthrough on
set -g visual-activity off
set -g mouse on
set -g status-right-length 100
set -g base-index 1
set -g @silentium_bg "#141414"
set -g @silentium_surface "#282828"
set -g @silentium_fg "#E6E6E6"
set -g @silentium_muted "#A6A6A6"
set -g @silentium_dim "#737373"
set -g @silentium_ghost "#4D4D4D"
set -g @silentium_accent "#F6CE4E"
set -g @silentium_red "#E85A4F"
set -g @silentium_green "#5FB36A"
set -g @silentium_blue "#5B82C7"
set -g @silentium_cyan "#64B8B4"
set -g status-position bottom
set -g status-style "bg=#141414,fg=#E6E6E6"
set -g status-left-length 0
set -g status-left ""
set -g status-right-length 80
set -g status-right "#[fg=#A6A6A6]#S "
setw -g window-status-style "bg=#141414,fg=#737373"
setw -g window-status-format " #I:#W "
setw -g window-status-current-style "bg=#F6CE4E,fg=#141414,bold"
setw -g window-status-current-format " #I:#W "
setw -g window-status-activity-style "fg=#5B82C7"
setw -g window-status-bell-style "bg=#E85A4F,fg=#141414,bold"
set -g pane-border-style "fg=#4D4D4D"
set -g pane-active-border-style "fg=#F6CE4E"
set -g message-style "bg=#282828,fg=#F6CE4E"
set -g message-command-style "bg=#282828,fg=#F6CE4E"
setw -g mode-style "bg=#F6CE4E,fg=#141414"
setw -g clock-mode-colour "#F6CE4E"
set -g menu-style "bg=#282828,fg=#E6E6E6"
set -g menu-selected-style "bg=#F6CE4E,fg=#141414"
set -g display-panes-active-colour "#F6CE4E"
set -g display-panes-colour "#737373"
set -g status-style "bg=default,fg=#A6A6A6"
setw -g window-status-current-style \
    "bg=default,fg=#F6CE4E,bold"
setw -g window-status-style \
    "bg=default,fg=#737373"

# plugins
run-shell ~/.config/tmux/plugins/tmux-resurrect/resurrect.tmux

# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
vim_pattern='(\S+/)?g?\.?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?'
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +${vim_pattern}$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'
if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l
